name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy SIPKEU ke Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: sipkeu-sakubijak
          docker-compose-path: docker-compose.yml
          environment-variables: |
            PORT=3000
            TZ=Asia/Jakarta
            ALLOWED_ORIGIN=https://sakubijak.com
            SIPKEU_ADMIN_USER=admin
            SIPKEU_ADMIN_PASSWORD=${{ secrets.SIPKEU_ADMIN_PASSWORD }}
            SIPKEU_OPERATOR_USER=operator
            SIPKEU_OPERATOR_PASSWORD=${{ secrets.SIPKEU_OPERATOR_PASSWORD }}
            SIPKEU_TRUST_PROXY=1
            SIPKEU_API_RATE_LIMIT=3000
            SIPKEU_LOGIN_RATE_LIMIT=180
            SIPKEU_IP_RATE_LIMIT=1500
            SIPKEU_ASSET_RATE_LIMIT=4000
            SIPKEU_PORTAL_STATUS_RATE=360
            SIPKEU_MAX_CONN_PER_IP=72
            SIPKEU_GLOBAL_MAX_CONN=22000
            SIPKEU_MAX_SESSIONS=25000
