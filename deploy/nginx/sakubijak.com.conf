# Nginx reverse proxy untuk sakubijak.com
# Salin ke /etc/nginx/sites-available/sakubijak.com lalu:
#   sudo ln -s /etc/nginx/sites-available/sakubijak.com /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d sakubijak.com -d www.sakubijak.com
#   sudo nginx -t && sudo systemctl reload nginx

upstream sipkeu_backend {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name sakubijak.com www.sakubijak.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sakubijak.com www.sakubijak.com;

    # Certbot akan mengisi path ini setelah `certbot --nginx`
    ssl_certificate     /etc/letsencrypt/live/sakubijak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sakubijak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 20M;

    location / {
        proxy_pass http://sipkeu_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
